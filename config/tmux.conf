# =============================================================================
# Tmux Configuration
# =============================================================================

# Default prefix is C-b (unchanged)
# Second prefix: C-w
set -g prefix2 C-w
bind C-w send-prefix -2

# =============================================================================
# True color support
# =============================================================================

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Text selection highlight — macOS-style blue
set -g mode-style "bg=#b4d5ff,fg=default"

# =============================================================================
# Status Bar — two lines
# =============================================================================

set -g status on
set -g status-position bottom
set -g status-style "bg=colour253,fg=colour238"

# Line 0: session name | window list | clock
set -g status-format[0] "#[align=left,bg=colour253,fg=colour25,bold] #S #[fg=colour238,nobold][⎇ ]#[fg=colour196,bold]#(git -C #{pane_current_path} branch --show-current 2>/dev/null)#[fg=colour238,nobold]#{?client_prefix, #[fg=colour196,bold][PREFIX]#[fg=colour238,nobold] , }#[align=centre]#{W:#{E:window-status-format},#{E:window-status-current-format}}#[align=right]%H:%M %d-%b "

# Line 1: cheatsheet (V2 — emoji per action)
#
# All keys require the prefix first: press C-b, release, then press the key.
#
# WINDOWS  (a window = a named tab within a session)
#   ➕ c        — create a new window
#   ◀ p        — go to the previous window
#   ▶ n        — go to the next window
#   ✏️  ,       — rename the current window
#   📋 w        — open an interactive window list / picker
#   ❌ &        — kill (close) the current window (asks for confirmation)
#
# PANES  (a pane = a split within a window)
#   ▄ "        — split current pane horizontally → new pane appears below
#   ▐ %        — split current pane vertically   → new pane appears to the right
#   ✖ x        — kill the current pane (asks for confirmation)
#   🔍 z        — zoom: toggle current pane fullscreen and back
#   ← ↑ ↓ →   — move focus between panes (hold prefix, then arrow key)
#
# SESSIONS  (a session = a top-level workspace; survives terminal close)
#   📂 s        — open an interactive session list / picker (switch sessions)
#   🚪 d        — detach: leave tmux running in background, return to plain shell
#                 re-attach later with: tmux attach -t <session-name>
#   🏷  $       — rename the current session
#
set -g status-format[1] "#[align=centre,bg=colour252,fg=colour238] ^b:  W:❲c q | p n ㆔w❳  P:❲v h x | z ←↑↓→❳  S:❲d ㆔s❳"

set -g status 2

# Window list (in line 0) — centred
set -g window-status-format         "#[default,fg=colour244] #I:#W "
set -g window-status-current-format "#[default,fg=colour255,bold] #I:#W "
set -g window-status-separator      ""

# =============================================================================
# Usability
# =============================================================================

# Mouse support
set -g mouse on

# Heavier pane borders give the mouse a larger target for drag-to-resize
set -g pane-border-lines double

# Scroll wheel enters copy mode but exits automatically when scrolling back to bottom
bind -T root WheelUpPane if -F "#{pane_in_mode}" "send -X scroll-up" "copy-mode -e"

# Start windows/panes at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Intuitive pane split shortcuts (alternatives to " and %)
bind v split-window -h  # C-b v → vertical split   (new pane to the right)
bind h split-window -v  # C-b h → horizontal split (new pane below)

# Kill shortcuts
bind q confirm-before -p "Kill window? (y/n)" kill-window  # C-b q → kill window (with confirmation)
bind x kill-pane                                            # C-b x → kill pane (no confirmation)
bind X kill-window                                          # C-b X → kill window (no confirmation)

# Run a shell command via popup — reusable alias
set -s command-alias[100] run-cmd="
    # set current time
    # Open a popup, run the command, and keep the popup open until the user presses Enter.
    display-popup -k -T '$ '$TMUX_RUN_CMD \
        -E 'clear; bash -c \"$TMUX_RUN_CMD\"; echo; echo Press Enter to close; read'
"

unbind .
unbind ,
bind . command-prompt -p "Run:" "set-environment -g TMUX_RUN_CMD '%%'; run-cmd"
bind , command-prompt -p "Run:" "set-environment -g TMUX_RUN_CMD '%%'; run-cmd"

# Reload config
set -g message-style "bg=#b4d5ff,fg=default"
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Faster key repetition
# tmux waits after receiving Escape to check if it's the start of an escape sequence
# (e.g. arrow keys). The default is 500ms, which causes a noticeable delay in editors
# like Vim/Neovim when pressing Escape to leave insert mode. Setting it to 0 removes
# that delay. This is safe because modern terminals send escape sequences fast enough
# that tmux can distinguish them without a delay.
# Note: status-keys (for rename/command prompts) defaults to emacs mode, where Escape
# acts as a meta prefix, not a cancel key — so this setting does not affect prompt
# behaviour. Use C-c or C-g to cancel prompts.
set -s escape-time 0

# Increase scrollback
set -g history-limit 10000
